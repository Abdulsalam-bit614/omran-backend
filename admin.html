<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم عُمران - الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #1a56db; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
        .stat-card { background: #1a56db; color: white; padding: 20px; border-radius: 12px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { padding: 15px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; font-weight: 700; }
        tr:hover { background: #f1f5f9; }
        .btn-action { padding: 8px 15px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.85rem; font-weight: bold; margin-left: 5px; transition: 0.3s; }
        .btn-verify { background: #22c55e; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-feature { background: #f59e0b; color: white; }
        .badge { padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; font-weight: bold; }
        .badge-verified { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1>
        <span><i class="fa-solid fa-gauge-high"></i> إدارة نظام عُمران</span>
        <button onclick="location.reload()" style="background:none; border:none; cursor:pointer; color:#1a56db;"><i class="fa-solid fa-rotate"></i></button>
    </h1>
    
    <div class="stats-grid">
        <div class="stat-card"><h3 id="count-pros">0</h3><p>إجمالي الحرفيين</p></div>
        <div class="stat-card" style="background:#22c55e;"><h3 id="count-verified">0</h3><p>حسابات موثقة</p></div>
        <div class="stat-card" style="background:#64748b;"><h3 id="count-users">0</h3><p>إجمالي المستخدمين</p></div>
    </div>

    <h3><i class="fa-solid fa-users-gear"></i> التحكم بالحسابات</h3>
    <div style="overflow-x: auto;">
        <table>
            <thead>
                <tr>
                    <th>الاسم</th>
                    <th>التخصص</th>
                    <th>المنطقة</th>
                    <th>الحالة</th>
                    <th>إجراءات الإدارة</th>
                </tr>
            </thead>
            <tbody id="pros-data">
                <tr><td colspan="5" style="text-align:center;">جاري جلب البيانات من السيرفر...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';

    async function loadAdminData() {
        try {
            const res = await fetch(`${API}/pros`);
            const data = await res.json();
            
            document.getElementById('count-pros').innerText = data.length;
            document.getElementById('count-verified').innerText = data.filter(p => p.isVerified).length;
            
            const tbody = document.getElementById('pros-data');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>
                        <strong>${p.name}</strong> 
                        ${p.isVerified ? '<span class="badge badge-verified">موثق ✅</span>' : ''}
                    </td>
                    <td>${p.spec}</td>
                    <td>${p.city}</td>
                    <td>${p.isBusy ? '🔴 مشغول' : '🟢 متاح'}</td>
                    <td>
                        <button class="btn-action btn-verify" onclick="updatePro('${p._id}', 'verify')">توثيق</button>
                        <button class="btn-action btn-feature" onclick="updatePro('${p._id}', 'feature')">تمييز</button>
                        <button class="btn-action btn-delete" onclick="deletePro('${p._id}')">حذف</button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('pros-data').innerHTML = '<tr><td colspan="5" style="text-align:center; color:red;">فشل الاتصال بالسيرفر. تأكد أن الباك إند يعمل.</td></tr>';
        }
    }

    // سيتم تفعيل هذه الدوال بمجرد تجهيز الـ Endpoints في الباك إند
    async function updatePro(id, action) {
        alert("طلب تنفيذ [" + action + "] للحرفي: " + id + "\nسيتم تفعيل هذا الزر بربطه مع الباك إند فوراً.");
    }

    async function deletePro(id) {
        if(confirm("تحذير: هل أنت متأكد من حذف هذا الحساب نهائياً من قاعدة البيانات؟")) {
            alert("سيتم الحذف فوراً...");
        }
    }

    window.onload = loadAdminData;
</script>
</body>
</html>
