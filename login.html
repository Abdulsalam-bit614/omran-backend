<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>دخول عُمران</title>
    <style>
        :root { --blue: #1a56db; --bg: #f0f4f8; --text: #0f172a; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        .form-group { text-align: right; margin-bottom: 1.2rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1.5px solid #e2e8f0; border-radius: 12px; outline: none; box-sizing: border-box; }
        
        .pass-wrapper { position: relative; }
        .toggle-eye { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; }

        .btn-submit { width: 100%; background: var(--blue); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .btn-submit:disabled { opacity: 0.7; }
        
        /* دائرة الانتظار */
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }
    </style>
</head>
<body>

<div class="login-card">
    <h2 style="color: var(--blue);">عُمران 🏗️</h2>
    <p style="color: #64748b; font-size: 0.9rem;">أهلاً بك، سجل دخولك للتحكم بملفك</p>

    <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="09xxxxxxxx" dir="ltr">
    </div>

    <div class="form-group">
        <label>كلمة المرور</label>
        <div class="pass-wrapper">
            <input type="password" id="password" placeholder="••••••••" dir="ltr">
            <span class="toggle-eye" onclick="togglePass()">👁️</span>
        </div>
    </div>

    <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
        <span class="spinner"></span>
        <span class="btn-text">تسجيل الدخول</span>
    </button>
    <div style="margin-top: 1.5rem; font-size: 0.9rem; color: #64748b;">
    ليس لديك حساب؟ 
    <a href="register.html" style="color: var(--blue); font-weight: bold; text-decoration: none;">إنشاء حساب جديد</a>
</div>

<div style="margin-top: 0.8rem; font-size: 0.8rem;">
    <a href="#" onclick="alert('يرجى التواصل مع الإدارة لاستعادة الحساب: 09XXXXXXXX')" style="color: #94a3b8; text-decoration: none;">نسيت كلمة المرور؟</a>
</div>
</div>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';

    function togglePass() {
        const p = document.getElementById('password');
        p.type = p.type === 'password' ? 'text' : 'password';
    }

    async function handleLogin() {
        const btn = document.getElementById('loginBtn');
        const phone = document.getElementById('phone').value;
        const pass = document.getElementById('password').value;

        if(!phone || !pass) return alert("الرجاء إدخال البيانات");

        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ phone: phone, password: pass })
            });

            const data = await res.json();

            if(res.ok) {
                // 💡 أهم خطوة: تخزين بيانات المستخدم في المتصفح
                localStorage.setItem('userId', data._id);
                localStorage.setItem('userName', data.name);
                
                // الانتقال لصفحة الملف الشخصي
                window.location.href = 'profile.html';
            } else {
                alert(data.message || "خطأ في الدخول");
            }
        } catch (error) {
            alert("السيرفر لا يستجيب");
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
