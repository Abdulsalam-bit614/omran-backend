<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عُمران - المنصة التفاعلية</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --danger: #ef4444; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        
        /* الهيدر */
        header { background: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); }

        /* لوحة تحكم الحرفي (تظهر فقط إذا سجل دخول) */
        .admin-panel { background: white; margin: 15px; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: none; border: 2px solid var(--primary); }
        .admin-header { display: flex; align-items: center; gap: 15px; margin-bottom: 15px; }
        .admin-avatar { width: 50px; height: 50px; background: var(--primary); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; }
        
        .status-switch { background: #f8fafc; padding: 12px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; }
        .switch { position: relative; width: 50px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px; background: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background: var(--danger); }
        input:checked + .slider:before { transform: translateX(24px); }

        /* قسم التعليقات والردود */
        .comments-section { margin-top: 15px; border-top: 1px solid #eee; padding-top: 10px; }
        .comment-box { background: #f1f5f9; padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9rem; }
        .reply-input { width: 80%; padding: 5px; border: 1px solid #ddd; border-radius: 5px; margin-top: 5px; }
        .btn-reply { background: var(--primary); color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }

        /* كروت الحرفيين */
        .pro-card { background: white; margin: 15px; padding: 15px; border-radius: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .pro-header { display: flex; gap: 12px; align-items: center; }
        .verified { color: var(--primary); margin-right: 5px; }
        
        .nav-bottom { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #eee; }
        .nav-item { text-decoration: none; color: #64748b; text-align: center; font-size: 0.75rem; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.4rem; display: block; }
    </style>
</head>
<body>

    <header>
        <div class="logo">🏗️ عُمران</div>
        <div id="authButtons">
            <a href="login.html" id="loginBtn" style="text-decoration:none; color:var(--primary); font-weight:bold;">دخول</a>
        </div>
    </header>

    <div id="myAdminPanel" class="admin-panel">
        <div class="admin-header">
            <div class="admin-avatar" id="myInitial">ع</div>
            <div>
                <h3 style="margin:0" id="myName">مرحباً بك</h3>
                <span style="font-size:0.8rem; color:gray;">لوحة إدارة حسابك</span>
            </div>
        </div>

        <div class="status-switch">
            <span>وضعية "مشغول الآن" 🔕</span>
            <label class="switch">
                <input type="checkbox" id="busyToggle" onchange="toggleBusy()">
                <span class="slider"></span>
            </label>
        </div>

        <div class="comments-section">
            <p style="font-weight:bold; font-size:0.9rem;">آخر التقييمات والتعليقات ⭐</p>
            <div id="myComments">
                <div class="comment-box">
                    <strong>أحمد:</strong> شغل ممتاز جداً بارك الله بك.
                    <br>
                    <input type="text" class="reply-input" placeholder="اكتب رداً...">
                    <button class="btn-reply">رد</button>
                </div>
            </div>
        </div>
        <button onclick="logout()" style="width:100%; margin-top:10px; background:none; border:none; color:gray; cursor:pointer;">تسجيل الخروج</button>
    </div>

    <div id="feed">
        </div>

    <nav class="nav-bottom">
        <a href="index.html" class="nav-item active"><i class="fa-solid fa-house"></i>الرئيسية</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-magnifying-glass"></i>تصفح</a>
        <a href="#" class="nav-item"><i class="fa-solid fa-plus-circle" style="color:var(--primary); font-size:1.8rem;"></i></a>
        <a href="#" class="nav-item"><i class="fa-solid fa-message"></i>رسائل</a>
        <a href="profile.html" class="nav-item"><i class="fa-solid fa-user-gear"></i>حسابي</a>
    </nav>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';
    const userId = localStorage.getItem('userId');
    const userName = localStorage.getItem('userName');

    // وظيفة التحقق: هل المستخدم حرفي ومسجل دخول؟
    function checkAuth() {
        if (userId && userName) {
            document.getElementById('myAdminPanel').style.display = 'block';
            document.getElementById('myName').innerText = userName;
            document.getElementById('myInitial').innerText = userName[0];
            document.getElementById('authButtons').style.display = 'none';
        }
    }

    // تبديل الحالة من الصفحة الرئيسية
    async function toggleBusy() {
        const isBusy = document.getElementById('busyToggle').checked;
        await fetch(`${API}/user/status/${userId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ isBusy: isBusy })
        });
        loadFeed(); // تحديث القائمة فوراً
    }

    async function loadFeed() {
        const res = await fetch(`${API}/pros`);
        const pros = await res.json();
        const feed = document.getElementById('feed');
        feed.innerHTML = '';

        pros.forEach(pro => {
            feed.innerHTML += `
                <div class="pro-card">
                    <div class="pro-header">
                        <div style="width:45px; height:45px; background:#eee; border-radius:10px; display:flex; align-items:center; justify-content:center;">${pro.name[0]}</div>
                        <div>
                            <h4 style="margin:0">${pro.name} <i class="fa-solid fa-circle-check verified"></i></h4>
                            <span style="font-size:0.8rem; color:gray;">${pro.spec} • ${pro.city}</span>
                        </div>
                        <div style="margin-right:auto">
                            <span style="color:${pro.isBusy ? 'red' : 'green'}; font-size:0.7rem; font-weight:bold;">
                                ${pro.isBusy ? '● مشغول' : '● متاح'}
                            </span>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    function logout() {
        localStorage.clear();
        location.reload();
    }

    checkAuth();
    loadFeed();
</script>
</body>
</html>
