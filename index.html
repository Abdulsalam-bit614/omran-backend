<script>
  const API_URL = 'https://omran-backend-1.onrender.com/api';

  // 1. وظيفة تحميل المنشورات (الحرفيين) في الصفحة الرئيسية
  async function loadHomeContent() {
    const feedContainer = document.getElementById('home-feed'); // تأكد من وجود هذا الـ ID في كودك
    if(!feedContainer) return;

    try {
      const res = await fetch(`${API_URL}/pros`);
      const pros = await res.json();
      feedContainer.innerHTML = '';

      pros.forEach(pro => {
        feedContainer.innerHTML += `
          <div class="card" style="margin-bottom:15px; padding:15px;">
            <div style="display:flex; align-items:center; gap:12px; margin-bottom:10px;">
              <div class="avatar" style="background:var(--blue); color:white; width:45px; height:45px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-weight:bold;">
                ${pro.name[0]}
              </div>
              <div style="flex:1">
                <h4 style="margin:0">${pro.name} <i class="fas fa-check-circle" style="color:var(--blue); font-size:0.8rem"></i></h4>
                <small style="color:gray">${pro.spec} • ${pro.city}</small>
              </div>
              <div class="status-badge" style="color:${pro.isBusy ? 'red' : 'green'}; font-size:0.7rem; font-weight:bold;">
                ${pro.isBusy ? '● مشغول' : '● متاح'}
              </div>
            </div>
            <p style="font-size:0.9rem; color:#333;">أهلاً بكم! أنا ${pro.name}، متخصص في ${pro.spec}. يسعدني خدمتكم بأفضل جودة في منطقة ${pro.city}.</p>
            <div style="display:flex; gap:10px; margin-top:10px; border-top:1px solid #eee; padding-top:10px;">
              <a href="tel:${pro.phone}" style="flex:1; text-align:center; padding:8px; background:var(--blue-lt); color:var(--blue); border-radius:8px; text-decoration:none; font-weight:bold; font-size:0.85rem;">
                <i class="fas fa-phone"></i> اتصال
              </a>
              <a href="https://wa.me/${pro.phone}" style="flex:1; text-align:center; padding:8px; background:#e8f5e9; color:#2e7d32; border-radius:8px; text-decoration:none; font-weight:bold; font-size:0.85rem;">
                <i class="fab fa-whatsapp"></i> واتساب
              </a>
              <button onclick="viewUserProfile('${pro._id}')" style="flex:0.5; background:#f5f5f5; border:none; border-radius:8px; cursor:pointer;">
                <i class="fas fa-ellipsis-h"></i>
              </button>
            </div>
          </div>
        `;
      });
    } catch (err) {
      console.error("خطأ في جلب البيانات:", err);
    }
  }

  // 2. وظيفة تسجيل الدخول وربطها بالواجهة
  async function handleLogin(id, pass) {
    try {
      const res = await fetch(`${API_URL}/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ phone: id, password: pass })
      });
      const data = await res.json();
      if(res.ok) {
        localStorage.setItem('userId', data.user._id);
        localStorage.setItem('userName', data.user.name);
        showToast("تم تسجيل الدخول بنجاح ✅");
        location.reload(); // لتفعيل لوحة التحكم في الرئيسية
      } else {
        showToast("خطأ: " + data.message, "err");
      }
    } catch (err) {
      showToast("عذراً، السيرفر لا يستجيب", "err");
    }
  }

  // 3. إضافة "لوحة التحكم السريعة" في أعلى الرئيسية للمسجلين
  function setupAdminHeader() {
    const userId = localStorage.getItem('userId');
    const userName = localStorage.getItem('userName');
    if(userId) {
      const adminHeader = document.createElement('div');
      adminHeader.className = 'card';
      adminHeader.style = "margin-bottom:15px; border:2px solid var(--blue); padding:15px; background:var(--blue-lt);";
      adminHeader.innerHTML = `
        <div style="display:flex; justify-content:space-between; align-items:center;">
          <div>
            <strong>مرحباً، ${userName} 👋</strong><br>
            <small>يمكنك إدارة حالتك من هنا</small>
          </div>
          <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer; font-size:0.8rem;">تسجيل خروج</button>
        </div>
        <div style="margin-top:10px; display:flex; gap:10px;">
          <button onclick="updateMyStatus(false)" style="flex:1; padding:8px; border-radius:8px; border:none; background:green; color:white; font-weight:bold;">أنا متاح الآن ✅</button>
          <button onclick="updateMyStatus(true)" style="flex:1; padding:8px; border-radius:8px; border:none; background:red; color:white; font-weight:bold;">أنا مشغول 🔕</button>
        </div>
      `;
      document.getElementById('home-feed').prepend(adminHeader);
    }
  }

  async function updateMyStatus(status) {
    const userId = localStorage.getItem('userId');
    await fetch(`${API_URL}/user/status/${userId}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ isBusy: status })
    });
    showToast("تم تحديث حالتك بنجاح");
    loadHomeContent();
  }

  function logout() {
    localStorage.clear();
    location.reload();
  }

  // تشغيل الوظائف عند فتح الصفحة
  window.addEventListener('DOMContentLoaded', () => {
    loadHomeContent();
    setTimeout(setupAdminHeader, 1000); // ننتظر قليلاً حتى يحمل الـ Feed
  });
</script>
