<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم عُمران - الإدارة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #f1f5f9; margin: 0; padding: 20px; }
        .admin-container { max-width: 1000px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        h1 { color: #1a56db; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 30px; }
        .stat-card { background: #1a56db; color: white; padding: 20px; border-radius: 10px; text-align: center; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; color: #64748b; }
        .btn-action { padding: 6px 12px; border-radius: 5px; border: none; cursor: pointer; font-size: 0.8rem; margin-left: 5px; }
        .btn-verify { background: #22c55e; color: white; }
        .btn-delete { background: #ef4444; color: white; }
        .btn-feature { background: #f59e0b; color: white; }
    </style>
</head>
<body>

<div class="admin-container">
    <h1><i class="fa-solid fa-gauge"></i> لوحة إدارة عُمران</h1>
    
    <div class="stats-grid">
        <div class="stat-card"><h3 id="count-pros">0</h3><p>إجمالي الحرفيين</p></div>
        <div class="stat-card" style="background:#22c55e;"><h3 id="count-verified">0</h3><p>حسابات موثقة</p></div>
        <div class="stat-card" style="background:#64748b;"><h3 id="count-users">0</h3><p>إجمالي المستخدمين</p></div>
    </div>

    <h3><i class="fa-solid fa-users-gear"></i> إدارة الحرفيين</h3>
    <table id="admin-table">
        <thead>
            <tr>
                <th>الاسم</th>
                <th>التخصص</th>
                <th>المنطقة</th>
                <th>الحالة</th>
                <th>إجراءات</th>
            </tr>
        </thead>
        <tbody id="pros-data">
            </tbody>
    </table>
</div>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';

    async function loadAdminData() {
        try {
            const res = await fetch(`${API}/pros`);
            const data = await res.json();
            document.getElementById('count-pros').innerText = data.length;
            document.getElementById('count-verified').innerText = data.filter(p => p.isVerified).length;
            
            const tbody = document.getElementById('pros-data');
            tbody.innerHTML = data.map(p => `
                <tr>
                    <td>${p.name} ${p.isVerified ? '✅' : ''}</td>
                    <td>${p.spec}</td>
                    <td>${p.city}</td>
                    <td>${p.isBusy ? '🔴 مشغول' : '🟢 متاح'}</td>
                    <td>
                        <button class="btn-action btn-verify" onclick="updatePro('${p._id}', 'verify')">توثيق</button>
                        <button class="btn-action btn-feature" onclick="updatePro('${p._id}', 'feature')">تمييز</button>
                        <button class="btn-action btn-delete" onclick="deletePro('${p._id}')">حذف</button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            console.error("خطأ في تحميل بيانات الإدارة");
        }
    }

    async function updatePro(id, action) {
        alert("سيتم تنفيذ إجراء: " + action + " للحرفي " + id);
        // هنا سنضيف لاحقاً كود الـ PUT الخاص بالباك إند
    }

    async function deletePro(id) {
        if(confirm("هل أنت متأكد من حذف هذا الحساب نهائياً؟")) {
            // هنا سنضيف لاحقاً كود الـ DELETE
        }
    }

    window.onload = loadAdminData;
</script>
</body>
</html>
