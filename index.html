<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>عُمران – سوريا</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">

<!-- ══ شريط الإعلانات ══ -->
<div class="ad-bar" id="ad-bar" style="display:none">
  <div class="ad-track" id="ad-track"></div>
</div>

<!-- ══ TOOLBAR ══ -->
<div style="background:var(--blue);padding:14px 16px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:60">
  <div style="flex:1"><svg width="108" height="44" viewBox="0 0 108 44" fill="none" xmlns="http://www.w3.org/2000/svg">
          <!-- بناية صغيرة (يمين) -->
          <rect x="2" y="17" width="9" height="13" rx="1" fill="rgba(255,255,255,0.72)"/>
          <rect x="4" y="20" width="2" height="2" fill="rgba(26,86,219,0.45)"/>
          <rect x="7" y="20" width="2" height="2" fill="rgba(26,86,219,0.45)"/>
          <!-- قنطرة من الصغيرة للوسطى -->
          <path d="M11 19 Q17.5 9 24 17" stroke="rgba(255,255,255,0.92)" stroke-width="1.8" fill="none" stroke-linecap="round"/>
          <!-- بناية وسطى -->
          <rect x="24" y="11" width="12" height="19" rx="1" fill="rgba(255,255,255,0.86)"/>
          <rect x="26" y="14" width="3" height="3" fill="rgba(26,86,219,0.38)"/>
          <rect x="31" y="14" width="3" height="3" fill="rgba(26,86,219,0.38)"/>
          <rect x="26" y="19" width="3" height="3" fill="rgba(26,86,219,0.38)"/>
          <rect x="31" y="19" width="3" height="3" fill="rgba(26,86,219,0.38)"/>
          <!-- بناية كبيرة (يسار) -->
          <rect x="39" y="4" width="15" height="26" rx="1" fill="white"/>
          <rect x="41" y="7"  width="4" height="3" fill="rgba(26,86,219,0.3)"/>
          <rect x="47" y="7"  width="4" height="3" fill="rgba(26,86,219,0.3)"/>
          <rect x="41" y="13" width="4" height="3" fill="rgba(26,86,219,0.3)"/>
          <rect x="47" y="13" width="4" height="3" fill="rgba(26,86,219,0.3)"/>
          <rect x="41" y="19" width="4" height="3" fill="rgba(26,86,219,0.3)"/>
          <rect x="47" y="19" width="4" height="3" fill="rgba(26,86,219,0.3)"/>
          <!-- خط الأرض -->
          <line x1="1" y1="30.5" x2="56" y2="30.5" stroke="rgba(255,255,255,0.35)" stroke-width="1" stroke-linecap="round"/>
          <!-- نص عُمران تحت البنايات من اليمين لليسار -->
          <text x="2" y="42" font-family="Tajawal, Arial, sans-serif" font-size="13" font-weight="900" fill="rgba(255,255,255,0.95)" letter-spacing="2.5">عُ  م  ر  ا  ن</text>
        </svg></div>
  <button id="admin-btn" onclick="showPage('pg-admin')" style="display:none;background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:13px;font-weight:700;cursor:pointer">⚙️</button>
  <button onclick="showPage('pg-profile')" style="background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:7px 12px;font-size:15px;cursor:pointer"><i class="fa-solid fa-circle-user"></i></button>
  <div class="sbar" style="max-width:180px;padding:7px 12px">
    <i class="fa-solid fa-magnifying-glass" style="color:var(--text3)"></i>
    <input type="text" id="main-search" placeholder="ابحث..." oninput="renderPros()">
  </div>
</div>

<!-- ══ HOME ══ -->
<div id="pg-home" class="page active">
  <div style="padding:14px 16px 0">
    <div class="hscroll" id="spec-chips" style="margin-bottom:12px">
      <div class="spec-chip on" onclick="setSpec('',this)">✨ الكل</div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:14px">
      <select class="fi" id="city-filter" onchange="onCityChange()" style="flex:1">
        <option value="">كل المحافظات</option>
      </select>
      <select class="fi" id="village-filter" onchange="renderPros()" style="flex:1;display:none">
        <option value="">كل القرى</option>
      </select>
    </div>
  </div>
  <div id="pros-list" style="padding:0 16px"></div>
</div>

<!-- ══ SEARCH ══ -->
<div id="pg-search" class="page">
  <div class="search-inner">
    <div class="fg"><label class="fl">التخصص</label>
      <select class="fi" id="br-spec" onchange="renderBrowse()"><option value="">الكل</option></select>
    </div>
    <div class="fg"><label class="fl">المحافظة</label>
      <select class="fi" id="br-city" onchange="onBrCityChange()"><option value="">الكل</option></select>
    </div>
    <select class="fi" id="br-village" onchange="renderBrowse()" style="display:none">
      <option value="">كل القرى</option>
    </select>
  </div>
  <div id="browse-list"></div>
</div>

<!-- ══ ADD ══ -->
<div id="pg-add" class="page">
  <div style="padding:16px">
    <div id="add-login-msg" style="display:none">
      <div class="empty"><div class="empty-icon">🔐</div>
        <div class="empty-text">يجب تسجيل الدخول أولاً</div>
        <button class="btn btn-primary" onclick="showPage('pg-profile')" style="margin-top:14px">تسجيل الدخول</button>
      </div>
    </div>
    <div id="add-form">
      <div class="fg"><label class="fl">الاسم الكامل</label><input class="fi" id="add-name" placeholder="اسمك الكامل"></div>
      <div class="fg"><label class="fl">التخصص</label>
        <select class="fi" id="add-spec">
          <option value="بلاط وسيراميك">بلاط وسيراميك</option>
          <option value="دهان وديكور">دهان وديكور</option>
          <option value="كهرباء">كهرباء</option>
          <option value="صحي وسباكة">صحي وسباكة</option>
          <option value="بناء وترميم">بناء وترميم</option>
          <option value="نجارة">نجارة</option>
          <option value="محل مواد بناء">محل مواد بناء</option>
          <option value="هندسة مدنية">هندسة مدنية</option>
          <option value="مقاولات">مقاولات</option>
          <option value="جبس وديكور">جبس وديكور</option>
          <option value="حديد وألمنيوم">حديد وألمنيوم</option>
        </select>
      </div>
      <div class="fg"><label class="fl">المحافظة</label><select class="fi" id="add-city" onchange="onAddCityChange()"><option value="">اختر</option></select></div>
      <select class="fi" id="add-village" style="display:none"><option value="">اختر القرية</option></select>
      <div class="fg"><label class="fl">رقم الهاتف</label><input class="fi" id="add-phone" type="tel" placeholder="09xxxxxxxx"></div>
      <div class="fg"><label class="fl">واتساب</label><input class="fi" id="add-wa" type="tel" placeholder="09xxxxxxxx"></div>
      <div class="fg"><label class="fl">وصف عملك</label><textarea class="fi" id="add-desc" placeholder="اكتب وصفاً مختصراً..."></textarea></div>
      <div class="fg"><label class="fl">سنوات الخبرة</label>
        <select class="fi" id="add-exp">
          <option value="أقل من سنة">أقل من سنة</option>
          <option value="1-5 سنوات">1-5 سنوات</option>
          <option value="5-10 سنوات">5-10 سنوات</option>
          <option value="10-15 سنة">10-15 سنة</option>
          <option value="أكثر من 15 سنة">أكثر من 15 سنة</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-add" onclick="submitPro()">نشر الملف المهني 🚀</button>
    </div>
  </div>
</div>

<!-- ══ CHAT ══ -->
<div id="pg-chat" class="page">
  <div class="empty" style="margin-top:40px">
    <div class="empty-icon">💬</div>
    <div class="empty-text">لا توجد محادثات حالياً</div>
  </div>
</div>

<!-- ══ PROFILE ══ -->
<div id="pg-profile" class="page">
  <div id="auth-section" style="padding:16px">

    <!-- تبديل دخول/تسجيل -->
    <div class="auth-toggle" id="auth-tabs">
      <button class="on" id="tab-login-btn" onclick="switchAuthTab('login')">تسجيل الدخول</button>
      <button id="tab-reg-btn" onclick="switchAuthTab('register')">حساب جديد</button>
    </div>

    <!-- نموذج الدخول -->
    <div id="login-form">
      <div class="fg">
        <label class="fl">رقم الهاتف أو البريد الإلكتروني</label>
        <input class="fi" id="log-id" placeholder="09xxxxxxxx أو email@example.com">
      </div>
      <div class="fg pass-wrap">
        <label class="fl">كلمة المرور</label>
        <input class="fi" type="password" id="log-pass" placeholder="••••••••">
        <button class="pass-toggle" onclick="togglePass('log-pass',this)">👁</button>
      </div>
      <button class="btn btn-primary btn-loading-wrap" id="btn-login" onclick="doLogin()">دخول</button>
      <p style="text-align:center;margin-top:10px;font-size:14px">
        <span style="color:var(--blue);cursor:pointer;font-weight:700" onclick="showSection('forgot-form')">نسيت كلمة المرور؟</span>
      </p>
    </div>

    <!-- نموذج التسجيل -->
    <div id="register-form" style="display:none">
      <div class="fg">
        <label class="fl">الاسم الكامل</label>
        <input class="fi" id="reg-name" placeholder="اسمك الكامل">
      </div>
      <div class="fg">
        <label class="fl">رقم الهاتف <span style="color:var(--text3);font-weight:400">(اختياري)</span></label>
        <input class="fi" id="reg-phone" type="tel" placeholder="09xxxxxxxx">
      </div>
      <div class="fg">
        <label class="fl">البريد الإلكتروني <span style="color:var(--text3);font-weight:400">(اختياري)</span></label>
        <input class="fi" type="email" id="reg-email" placeholder="email@example.com">
      </div>
      <div class="fg pass-wrap">
        <label class="fl">كلمة المرور</label>
        <input class="fi" type="password" id="reg-pass" placeholder="6 أحرف على الأقل">
        <button class="pass-toggle" onclick="togglePass('reg-pass',this)">👁</button>
      </div>
      <div class="fg">
        <label class="fl">نوع الحساب</label>
        <select class="fi" id="reg-type">
          <option value="client">عميل — أبحث عن خدمة</option>
          <option value="pro">معلم حرفي</option>
          <option value="pro">محل مواد بناء</option>
          <option value="pro">مهندس</option>
          <option value="pro">متعهد</option>
        </select>
      </div>
      <button class="btn btn-primary" id="btn-register" onclick="doRegister()">إنشاء الحساب</button>
    </div>

    <!-- نسيت كلمة المرور -->
    <div id="forgot-form" style="display:none">
      <h3 style="margin-bottom:16px;font-size:1rem">إعادة تعيين كلمة المرور</h3>
      <div class="fg"><label class="fl">رقم الهاتف</label><input class="fi" id="forgot-phone" placeholder="09xxxxxxxx"></div>
      <div class="fg pass-wrap"><label class="fl">كلمة المرور الجديدة</label><input class="fi" type="password" id="forgot-newpass"><button class="pass-toggle" onclick="togglePass('forgot-newpass',this)">👁</button></div>
      <div class="fg pass-wrap"><label class="fl">تأكيد كلمة المرور</label><input class="fi" type="password" id="forgot-confirm"><button class="pass-toggle" onclick="togglePass('forgot-confirm',this)">👁</button></div>
      <button class="btn btn-primary" id="btn-forgot" onclick="resetPassword()">تعيين كلمة المرور</button>
      <p style="text-align:center;margin-top:10px;font-size:14px"><span style="color:var(--blue);cursor:pointer" onclick="switchAuthTab('login')">← رجوع للدخول</span></p>
    </div>
  </div>

  <!-- مسجل -->
  <div id="user-section" style="display:none">
    <div class="ph">
      <div class="av-upload" onclick="document.getElementById('avatar-input').click()">
        <div class="av" id="profile-av" style="width:72px;height:72px;margin:0 auto;font-size:2rem;background:rgba(255,255,255,.2);color:#fff"></div>
        <div class="av-upload-overlay"><i class="fa-solid fa-camera"></i></div>
      </div>
      <input type="file" id="avatar-input" accept="image/*" style="display:none" onchange="onAvatarChange(this)">
      <div class="pn" id="profile-name"></div>
      <div class="pr" id="profile-type"></div>
    </div>
    <div style="padding:16px;border-bottom:1px solid var(--gray2)">
      <div class="sh"><span class="st">صور أعمالي</span><span id="photos-count" style="font-size:13px;color:var(--text3)">0/50</span></div>
      <div class="photo-grid" id="my-photos-grid"></div>
      <div class="photo-add" onclick="document.getElementById('photos-input').click()" style="margin-top:8px">+</div>
      <input type="file" id="photos-input" accept="image/*" multiple style="display:none" onchange="onPhotosChange(this)">
    </div>
    <div style="padding:16px;border-bottom:1px solid var(--gray2)">
      <div class="st" style="margin-bottom:14px">تغيير كلمة المرور</div>
      <div class="fg pass-wrap"><input class="fi" type="password" id="old-pass" placeholder="كلمة المرور الحالية"><button class="pass-toggle" onclick="togglePass('old-pass',this)">👁</button></div>
      <div class="fg pass-wrap"><input class="fi" type="password" id="new-pass" placeholder="كلمة المرور الجديدة"><button class="pass-toggle" onclick="togglePass('new-pass',this)">👁</button></div>
      <div class="fg pass-wrap"><input class="fi" type="password" id="confirm-pass" placeholder="تأكيد كلمة المرور الجديدة"><button class="pass-toggle" onclick="togglePass('confirm-pass',this)">👁</button></div>
      <button class="btn btn-secondary" onclick="changePassword()">حفظ كلمة المرور</button>
    </div>
    <div style="padding:16px">
      <button class="btn" style="background:var(--red);color:#fff" onclick="doLogout()">تسجيل الخروج</button>
    </div>
  </div>
</div>

<!-- ══ DETAIL ══ -->
<div id="pg-detail" class="page">
  <div style="background:var(--blue);padding:12px 16px;display:flex;align-items:center;gap:10px">
    <button class="btn-back" onclick="showPage('pg-home')">← رجوع</button>
  </div>
  <div id="detail-header" style="background:linear-gradient(160deg,var(--blue-dk),var(--blue-mid));padding:20px 16px;color:white"></div>
  <div id="detail-body" style="padding:16px"></div>
</div>

<!-- ══ ADMIN ══ -->
<div id="pg-admin" class="page">
  <div style="padding:16px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <span class="st">لوحة الأدمن ⚙️</span>
      <button class="btn-back" onclick="showPage('pg-home')">رجوع</button>
    </div>
    <div id="admin-list"></div>
  </div>
</div>

<!-- ══ BOTTOM NAV ══ -->
<nav class="bnav">
  <button class="nb on" id="nb-home" onclick="showPage('pg-home')"><span class="ni">🏠</span>الرئيسية</button>
  <button class="nb" id="nb-search" onclick="showPage('pg-search')"><span class="ni">🔍</span>تصفح</button>
  <button class="nb" id="nb-add" onclick="showPage('pg-add')" style="position:relative">
    <div style="position:absolute;top:-22px;background:var(--blue);width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:1.6rem;box-shadow:0 6px 20px rgba(26,86,219,.35);border:4px solid var(--bg)">＋</div>
    <span style="margin-top:28px;font-size:11px;font-weight:700">إضافة</span>
  </button>
  <button class="nb" id="nb-chat" onclick="showPage('pg-chat')"><span class="ni">💬</span>رسائل</button>
  <button class="nb" id="nb-profile" onclick="showPage('pg-profile')"><span class="ni">👤</span>حسابي</button>
</nav>

</div>
<script src="app.js"></script>
</body>
</html>
