<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة عُمران - درعا</title>
    <style>
        :root { --primary: #2563eb; --success: #059669; --warning: #d97706; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .header { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); text-align: center; margin-bottom: 2rem; }
        .card { background: white; padding: 1.5rem; border-radius: 12px; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); margin-bottom: 2rem; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        input, select { width: 100%; padding: 0.75rem; border: 1px solid #e2e8f0; border-radius: 8px; margin-top: 0.5rem; }
        button { background: var(--primary); color: white; border: none; padding: 0.75rem 1.5rem; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 1rem; }
        .pro-card { display: flex; justify-content: space-between; align-items: center; padding: 1rem; border-bottom: 1px solid #f1f5f9; }
        .badge { font-size: 0.75rem; padding: 0.25rem 0.5rem; border-radius: 9999px; font-weight: 600; margin-right: 0.5rem; }
        .badge-v { background: #dcfce7; color: #166534; }
        .badge-f { background: #fef9c3; color: #854d0e; }
        .action-btns { display: flex; gap: 0.5rem; }
        .btn-v { background: var(--success); padding: 0.5rem; font-size: 0.8rem; }
        .btn-f { background: var(--warning); padding: 0.5rem; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>🏗️ لوحة تحكم عُمران</h1>
        <p>إدارة الحرفيين والمهنيين في محافظة درعا</p>
    </div>

    <div class="card">
        <h3>➕ إضافة حرفي جديد</h3>
        <form id="addForm">
            <div class="grid">
                <input type="text" id="name" placeholder="الاسم الكامل" required>
                <select id="spec">
                    <option value="كهربائي">كهربائي</option>
                    <option value="سباك">سباك</option>
                    <option value="بناء">بناء</option>
                    <option value="دهان">دهان</option>
                    <option value="نجار">نجار</option>
                </select>
                <input type="text" id="area" placeholder="المنطقة (مثال: طفس)" required>
                <input type="text" id="phone" placeholder="رقم الهاتف" required>
            </div>
            <button type="submit">إضافة الآن</button>
        </form>
    </div>

    <div class="card">
        <h3>👥 قائمة المسجلين</h3>
        <div id="list">جاري التحميل...</div>
    </div>
</div>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';

    async function load() {
        const res = await fetch(`${API}/pros`);
        const data = await res.json();
        document.getElementById('list').innerHTML = data.map(p => `
            <div class="pro-card">
                <div>
                    <strong>${p.name}</strong> <small>(${p.spec})</small>
                    <div>
                        ${p.verified ? '<span class="badge badge-v">✓ موثق</span>' : ''}
                        ${p.isFeatured ? '<span class="badge badge-f">★ مميز</span>' : ''}
                    </div>
                </div>
                <div class="action-btns">
                    <button class="btn-v" onclick="verify('${p._id}')">توثيق</button>
                    <button class="btn-f" onclick="feature('${p._id}', ${!p.isFeatured})">
                        ${p.isFeatured ? 'إلغاء التميز' : 'تمييز'}
                    </button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('addForm').onsubmit = async (e) => {
        e.preventDefault();
        await fetch(`${API}/pros/add`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({
                name: document.getElementById('name').value,
                spec: document.getElementById('spec').value,
                area: document.getElementById('area').value,
                phone: document.getElementById('phone').value
            })
        });
        e.target.reset();
        load();
    };

    async function verify(id) {
        await fetch(`${API}/pros/admin/verify-pro/${id}`, { method: 'PUT' });
        load();
    }

    async function feature(id, status) {
        await fetch(`${API}/pros/admin/feature-pro/${id}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ isFeatured: status })
        });
        load();
    }

    load();
</script>
</body>
</html>
