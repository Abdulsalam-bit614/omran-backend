<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عُمران - المنصة الشاملة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #1a56db; --bg: #f1f5f9; --white: #ffffff; --text: #1e293b; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; overflow-x: hidden; }

        /* Header & Logo */
        header { background: var(--primary); color: white; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); position: sticky; top: 0; z-index: 1000; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .buildings { display: flex; align-items: flex-end; gap: 3px; position: relative; padding-top: 5px; }
        .b { background: white; width: 7px; border-radius: 1px; }
        .b1 { height: 12px; } .b2 { height: 18px; } .b3 { height: 25px; }
        .b-line { position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: white; }
        .logo-text { font-weight: bold; font-size: 1.3rem; letter-spacing: 1px; }

        /* Search & Filters */
        .search-section { background: var(--primary); padding: 0 20px 25px; border-radius: 0 0 30px 30px; }
        .search-bar { background: white; padding: 12px 15px; border-radius: 12px; display: flex; align-items: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .search-bar input { border: none; outline: none; width: 100%; font-family: inherit; font-size: 0.9rem; }
        
        .filters { display: flex; gap: 8px; margin-top: 15px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .filters select { border: none; padding: 8px 12px; border-radius: 8px; font-family: inherit; font-size: 0.8rem; background: rgba(255,255,255,0.2); color: white; outline: none; min-width: 100px; }
        .filters select option { color: black; }

        /* Cards */
        .pros-container { padding: 20px; display: grid; gap: 15px; }
        .pro-card { background: white; border-radius: 20px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .pro-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .avatar-box { width: 55px; height: 55px; background: #e2e8f0; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 1.4rem; color: #64748b; border: 2px solid #fff; }
        .pro-details h3 { margin: 0; font-size: 1.05rem; display: flex; align-items: center; gap: 5px; }
        .pro-details p { margin: 3px 0; font-size: 0.85rem; color: #64748b; }
        
        .action-btns { display: flex; gap: 8px; border-top: 1px solid #f1f5f9; padding-top: 12px; }
        .btn { flex: 1; border: none; padding: 8px; border-radius: 10px; font-family: inherit; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.3s; }
        .btn-call { background: #dcfce7; color: #166534; }
        .btn-ws { background: #25d366; color: white; }
        .btn-chat { background: #eff6ff; color: #1e40af; }

        /* Modals (Popups) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; justify-content: center; align-items: center; padding: 20px; }
        .modal-content { background: white; width: 100%; max-width: 400px; border-radius: 25px; padding: 25px; position: relative; max-height: 90vh; overflow-y: auto; }
        .close-modal { position: absolute; top: 15px; left: 15px; font-size: 1.2rem; cursor: pointer; color: #94a3b8; }
        
        input[type="text"], input[type="password"], input[type="tel"], input[type="email"], select.form-input {
            width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #e2e8f0; border-radius: 10px; box-sizing: border-box; font-family: inherit;
        }
        .submit-btn { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 12px; margin-top: 10px; font-weight: bold; cursor: pointer; }

        /* Bottom Nav */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: white; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #e2e8f0; box-shadow: 0 -4px 10px rgba(0,0,0,0.05); z-index: 1000; }
        .nav-item { color: #94a3b8; text-decoration: none; text-align: center; font-size: 0.75rem; transition: 0.3s; }
        .nav-item.active { color: var(--primary); }
        .nav-item i { font-size: 1.3rem; margin-bottom: 3px; }
    </style>
</head>
<body>

            </div>

        <a href="#" class="nav-item" onclick="openLogin()"><i class="fa-solid fa-user-circle"></i><br>حسابي</a>
    </nav>
