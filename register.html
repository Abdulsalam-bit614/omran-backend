<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب - عُمران</title>
    <style>
        :root { --blue: #1a56db; --bg: #f0f4f8; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .card { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; text-align: center; }
        .form-group { text-align: right; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.85rem; color: #475569; }
        input, select { width: 100%; padding: 10px; border: 1.5px solid #e2e8f0; border-radius: 10px; outline: none; box-sizing: border-box; font-family: inherit; }
        input:focus { border-color: var(--blue); }
        .btn-reg { width: 100%; background: var(--blue); color: white; border: none; padding: 12px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 18px; height: 18px; border: 3px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.8s linear infinite; display: none; margin-left: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading .spinner { display: block; }
        .loading .btn-text { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="color: var(--blue); margin-top: 0;">إنشاء حساب جديد 🏗️</h2>
    <p style="color: #64748b; font-size: 0.85rem; margin-bottom: 1.5rem;">انضم إلى كوكبة الحرفيين في عُمران</p>

    <div class="form-group">
        <label>الاسم الكامل</label>
        <input type="text" id="name" placeholder="مثال: أحمد المحمد">
    </div>

    <div class="form-group">
        <label>رقم الهاتف</label>
        <input type="tel" id="phone" placeholder="09xxxxxxxx" dir="ltr">
    </div>

    <div class="form-group">
        <label>المهنة</label>
        <select id="spec">
            <option value="">اختر مهنتك...</option>
            <option value="نجار">نجار</option>
            <option value="حداد">حداد</option>
            <option value="بناء">بناء</option>
            <option value="كهربائي">كهربائي</option>
            <option value="دهان">دهان</option>
        </select>
    </div>

    <div class="form-group" style="display: flex; gap: 10px;">
        <div style="flex: 1;">
            <label>المحافظة</label>
            <input type="text" id="city" placeholder="مثال: درعا">
        </div>
        <div style="flex: 1;">
            <label>المنطقة/القرية</label>
            <input type="text" id="village" placeholder="مثال: طفس">
        </div>
    </div>

    <div class="form-group">
        <label>كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••">
    </div>

    <button class="btn-reg" id="regBtn" onclick="handleRegister()">
        <span class="spinner"></span>
        <span class="btn-text">إنشاء الحساب</span>
    </button>

    <div style="margin-top: 1rem; font-size: 0.85rem;">
        لديك حساب بالفعل؟ <a href="login.html" style="color: var(--blue); text-decoration: none; font-weight: bold;">سجل دخولك</a>
    </div>
</div>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';

    async function handleRegister() {
        const btn = document.getElementById('regBtn');
        const userData = {
            name: document.getElementById('name').value,
            phone: document.getElementById('phone').value,
            spec: document.getElementById('spec').value,
            city: document.getElementById('city').value,
            village: document.getElementById('village').value,
            password: document.getElementById('password').value,
            role: 'pro' // افتراضياً حرفي
        };

        if(!userData.name || !userData.phone || !userData.password) return alert("عبّي البيانات يا غالي!");

        btn.classList.add('loading');
        btn.disabled = true;

        try {
            const res = await fetch(`${API}/auth/register`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(userData)
            });

            if(res.ok) {
                alert("تم إنشاء الحساب بنجاح! سجل دخولك الآن.");
                window.location.href = 'login.html';
            } else {
                const err = await res.json();
                alert(err.error || "في مشكلة بالتسجيل");
            }
        } catch (error) {
            alert("السيرفر مو شغال، حاول بعد شوي");
        } finally {
            btn.classList.remove('loading');
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
