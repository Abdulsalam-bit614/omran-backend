<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - عُمران</title>
    <style>
        :root { --blue: #1a56db; --bg: #f1f5f9; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .profile-header { text-align: center; }
        .avatar { width: 80px; height: 80px; background: var(--blue); color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; margin: 0 auto 10px; }
        .status-box { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px; border-radius: 12px; }
        
        /* زر الحالة مشغول/متاح */
        .switch { position: relative; display: inline-block; width: 60px; height: 30px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 34px; }
        .slider:before { position: absolute; content: ""; height: 22px; width: 22px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #ef4444; }
        input:checked + .slider:before { transform: translateX(30px); }

        .btn-logout { background: #64748b; color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="card profile-header">
        <div class="avatar" id="avatarLetter">ع</div>
        <h2 id="userName">جاري التحميل...</h2>
        <p id="userJob" style="color: #64748b;"></p>
    </div>

    <div class="card status-box">
        <div>
            <span style="font-weight: bold; display: block;">وضعية الانشغال</span>
            <small id="statusText" style="color: #64748b;">أنت الآن: متاح للعمل</small>
        </div>
        <label class="switch">
            <input type="checkbox" id="busyToggle" onchange="toggleBusy()">
            <span class="slider"></span>
        </label>
    </div>

    <div class="card">
        <h3>إحصائيات سريعة</h3>
        <p>📍 المنطقة: <span id="userLocation">--</span></p>
        <p>📞 الهاتف: <span id="userPhone">--</span></p>
    </div>

    <button class="btn-logout" onclick="logout()">تسجيل الخروج</button>
</div>

<script>
    const API = 'https://omran-backend-1.onrender.com/api';
    const userId = localStorage.getItem('userId');

    // إذا ما في ID يرجعه لصفحة الدخول
    if (!userId) window.location.href = 'login.html';

    // جلب بيانات المستخدم من السيرفر (بدل البيانات الوهمية)
    async function loadData() {
        try {
            // ملاحظة: سنفترض أننا سنعرض البيانات المخزنة مؤقتاً أو نطلبها من السيرفر
            // للتسهيل الآن سنعرض الاسم المخزن في الـ localStorage
            document.getElementById('userName').innerText = localStorage.getItem('userName') || "مستخدم عُمران";
            document.getElementById('avatarLetter').innerText = (localStorage.getItem('userName') || "ع").charAt(0);
        } catch (e) { console.log(e); }
    }

    async function toggleBusy() {
        const isBusy = document.getElementById('busyToggle').checked;
        document.getElementById('statusText').innerText = isBusy ? "أنت الآن: مشغول" : "أنت الآن: متاح للعمل";
        
        // إرسال الحالة للسيرفر
        await fetch(`${API}/user/status/${userId}`, {
            method: 'PUT',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ isBusy: isBusy })
        });
    }

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }

    loadData();
</script>

</body>
</html>
